llm:
  # 默认模型
  default: "glm"

  # 多模型配置
  models:
    glm:
      modelName: 'GLM-4-Flash-250414'
      apiKey: "9d800547f8ad44a69333a5101fdd8357.YHgHndotPCQQ0o6a"
      apiBase: "https://open.bigmodel.cn/api/paas/v4"
      maxTokens: 1024
      temperature: 0.7
      timeout: 120
      type: "openai"

    deepseek:
      modelName: 'deepseek-chat'
      apiKey: "your-deepseek-api-key"
      apiBase: "https://api.deepseek.com/v1"
      maxTokens: 1024
      temperature: 0.7
      timeout: 120
      type: "openai"

    qwen:
      modelName: 'qwen-plus'
      apiKey: "your-qwen-api-key"
      apiBase: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      maxTokens: 1024
      temperature: 0.7
      timeout: 120
      type: "openai"

    custom:
      modelName: 'qwen-plus'
      apiKey: "your-qwen-api-key"
      apiBase: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      maxTokens: 1024
      temperature: 0.7
      timeout: 120
      type: "openai"

